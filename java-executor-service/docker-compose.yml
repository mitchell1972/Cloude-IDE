version: '3.8'

services:
  java-executor:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MAX_EXECUTION_TIME=30000
      - MAX_MEMORY_MB=512
      - MAX_CONCURRENT_EXECUTIONS=10
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - java-temp:/tmp/java-executor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  java-temp:
    driver: local